<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Reviewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E1116;
    --surface: #161A21;
    --surface-2: #1D222B;
    --border: #272C36;
    --text: #E7E5DF;
    --text-dim: #8A90A0;
    --accent: #F2B84B;
    --accent-dim: #7A6535;
    --good: #6FCF97;
    --bad: #E2604F;
    --mid: #F2B84B;
    --radius: 10px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
  }

  header{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 40px;
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1{
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .model-tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
  }

  .grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 760px){
    .grid{ grid-template-columns: 1fr; }
  }

  .panel{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .panel-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    display:flex;
    align-items:center;
    gap: 8px;
  }

  .panel-label::before{
    content:"";
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display:inline-block;
  }

  label{
    display:block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 18px;
  }

  label:first-of-type{ margin-top: 0; }

  input[type="text"], textarea{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    resize: vertical;
    transition: border-color 0.15s ease;
  }

  input[type="text"]:focus, textarea:focus{
    outline: none;
    border-color: var(--accent);
  }

  textarea{
    min-height: 220px;
    line-height: 1.5;
  }

  button{
    width: 100%;
    margin-top: 22px;
    background: var(--accent);
    color: #1a1406;
    border: none;
    border-radius: 6px;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  button:hover:not(:disabled){ opacity: 0.9; }
  button:active:not(:disabled){ transform: scale(0.99); }
  button:disabled{ opacity: 0.5; cursor: not-allowed; }

  button:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .error-banner{
    display:none;
    background: rgba(226, 96, 79, 0.1);
    border: 1px solid var(--bad);
    color: #f2a89e;
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 18px;
    line-height: 1.5;
  }

  .result-panel{
    display:flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 380px;
  }

  .result-empty{
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    line-height: 1.7;
  }

  .result-empty span{
    display:block;
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .gauge-wrap{
    display:none;
    width: 100%;
    flex-direction: column;
    align-items: center;
  }

  .gauge-wrap.active{ display:flex; }

  .score-number{
    font-family: 'JetBrains Mono', monospace;
    font-size: 52px;
    font-weight: 700;
    margin-top: -18px;
  }

  .score-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 2px;
    margin-bottom: 20px;
  }

  .feedback-box{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .loading{
    display:none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-align:center;
  }

  .loading.active{ display:block; }

  footer{
    margin-top: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.7;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div>
      <div class="eyebrow">AI Screening Tool</div>
      <h1>Resume Reviewer</h1>
    </div>
    <div class="model-tag">
      model: openai/gpt-oss-120b<br>
      via groq
    </div>
  </header>

  <div class="grid">

    <div class="panel">
      <div class="panel-label">Candidate Input</div>

      <label for="name">Candidate name</label>
      <input type="text" id="name" placeholder="e.g. Rahul Sharma">

      <label for="resume">Resume text</label>
      <textarea id="resume" placeholder="Paste the resume content here..."></textarea>

      <button id="submitBtn" onclick="runReview()">Run Review</button>

      <div class="error-banner" id="errorBanner"></div>
    </div>

    <div class="panel result-panel">

      <div class="result-empty" id="resultEmpty">
        <span>&#8734;</span>
        No review yet.<br>Fill in the form and run a review.
      </div>

      <div class="loading" id="loading">Scoring resume...</div>

      <div class="gauge-wrap" id="gaugeWrap">
        <svg width="220" height="130" viewBox="0 0 220 130">
          <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="#272C36" stroke-width="14" stroke-linecap="round"/>
          <path id="gaugeArc" d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="var(--accent)" stroke-width="14" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="283"/>
          <line id="needle" x1="110" y1="110" x2="110" y2="35" stroke="#E7E5DF" stroke-width="3" stroke-linecap="round" style="transform-origin: 110px 110px;"/>
          <circle cx="110" cy="110" r="6" fill="#E7E5DF"/>
        </svg>
        <div class="score-number" id="scoreNumber">0</div>
        <div class="score-label">fit score / 100</div>
        <div class="feedback-box" id="feedbackBox"></div>
      </div>

    </div>

  </div>

  <footer>
    Requires the backend running locally at localhost:8000 &mdash; see backend.py
  </footer>

</div>

<script>
  const API_URL = "http://localhost:8000/review";

  async function runReview(){
    const name = document.getElementById('name').value.trim();
    const resumeText = document.getElementById('resume').value.trim();
    const errorBanner = document.getElementById('errorBanner');
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resultEmpty = document.getElementById('resultEmpty');
    const gaugeWrap = document.getElementById('gaugeWrap');

    errorBanner.style.display = 'none';

    if(!resumeText){
      errorBanner.textContent = "Paste in the resume text before running a review.";
      errorBanner.style.display = 'block';
      return;
    }

    btn.disabled = true;
    resultEmpty.style.display = 'none';
    gaugeWrap.classList.remove('active');
    loading.classList.add('active');

    try{
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name || "Unnamed candidate", resume_text: resumeText })
      });

      if(!res.ok){
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.detail || `Request failed with status ${res.status}`);
      }

      const data = await res.json();
      showResult(data.score, data.feedback);

    } catch(err){
      loading.classList.remove('active');
      resultEmpty.style.display = 'block';
      errorBanner.textContent = "Could not get a review. " +
        "Make sure backend.py is running on localhost:8000. Details: " + err.message;
      errorBanner.style.display = 'block';
    } finally{
      btn.disabled = false;
    }
  }

  function showResult(score, feedback){
    const loading = document.getElementById('loading');
    const gaugeWrap = document.getElementById('gaugeWrap');
    const scoreNumber = document.getElementById('scoreNumber');
    const feedbackBox = document.getElementById('feedbackBox');
    const arc = document.getElementById('gaugeArc');
    const needle = document.getElementById('needle');

    loading.classList.remove('active');
    gaugeWrap.classList.add('active');

    scoreNumber.textContent = score;
    feedbackBox.textContent = feedback;

    // color by score band
    let color = getComputedStyle(document.documentElement).getPropertyValue('--bad');
    if(score >= 70) color = getComputedStyle(document.documentElement).getPropertyValue('--good');
    else if(score >= 40) color = getComputedStyle(document.documentElement).getPropertyValue('--mid');
    arc.style.stroke = color;
    scoreNumber.style.color = color;

    // arc: circumference of half circle path ~ 283 (radius 90 * pi)
    const circumference = 283;
    const offset = circumference - (circumference * (score/100));
    arc.style.strokeDashoffset = offset;

    // needle: -90deg (score 0) to 90deg (score 100)
    const angle = -90 + (180 * (score/100));
    needle.style.transform = `rotate(${angle}deg)`;
  }
</script>

</body>
</html>
